name: Deploy to Nitro

# Déploie le couloir des portes temporelles sur
# https://nitro.sterenna.fr/dedale/ via rsync SSH (convention Nitro apps).

on:
  push:
    branches: [main]
    paths:
      - "dedale_dossier_complet_v6/**"
      - ".github/workflows/deploy-nitro.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nitro
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy corridor via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            dedale_dossier_complet_v6/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/dedale/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
